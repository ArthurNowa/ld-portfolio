<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevers GP - E-GAMES SIIVim Tour by Nevers</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--red-brown);
        }
        h1 {
            color: white;
        }
        h2 {
            color: #208050;
        }
        .header {
            background-color: #205080;
            padding: 20px;
            text-align: center;
        }

        .project-presentation {
            margin: 0 auto;
            display: inline-block;
            width: 1600px;
            height: 300px;
            float: center;
        }
        .left {
            float:left;
        }
        .right {
            float:right;
        }
        #circuit-image {
            align: middle;
            text-align: center;
            display: block;
            margin: 0 auto;
            width: 65%;
            object-position: left center;
        }
    </style>
</head>
<body>
    <script src="../js/navbar.js"></script>
    <div class="header">
        <h1>Nevers GP</h1>
        <h2>E-GAMES SIIVim Tour by Nevers - Trackmania</h2>
    </div>
    <div class="project-presentation">
        <div class="left">
            <h3>Vue aérienne du circuit</h3>
            <img src="../images/nevers-gp.png" alt="Nevers GP Circuit" id="circuit-image">
        </div>
        <div class="right">
            <h3>Phase finale castée en live sur twitch</h3>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/7B8P4LDRCME?si=6iRLOln1-yjFLORN&amp;start=8623" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
    </div>
</body>
</html>
